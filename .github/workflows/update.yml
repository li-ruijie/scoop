name: Update Bucket

on:
  schedule:
    - cron: '0 * * * *'  # Run hourly
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Scoop for checkver script
        run: git clone https://github.com/ScoopInstaller/Scoop.git --depth 1 "$RUNNER_TEMP/scoop-bin"
        shell: bash

      - name: Run checkver on all manifests
        run: |
          $scoopBin = Join-Path $env:RUNNER_TEMP "scoop-bin"
          $env:GIT_REDIRECT_STDERR = '2>&1'
          & "$scoopBin/bin/checkver.ps1" -Dir bucket -Update
          exit 0

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update manifests"
            git push
          fi
