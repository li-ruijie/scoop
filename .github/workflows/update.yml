name: Update Bucket

on:
  schedule:
    - cron: '0 * * * *'  # Run hourly
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Scoop for checkver script
        run: git clone https://github.com/ScoopInstaller/Scoop.git --depth 1 "$RUNNER_TEMP/scoop-bin"
        shell: bash

      - name: Run checkver on all manifests
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -Command '
            $ErrorActionPreference = "Continue"
            $scoopBin = Join-Path $env:RUNNER_TEMP "scoop-bin"
            & "$scoopBin/bin/checkver.ps1" -Dir bucket -Update
          ' 2>&1
          exit_code=$?
          # Exit code 1 is normal (some manifests may fail to check)
          # Only fail on unexpected errors
          if [ $exit_code -gt 1 ]; then
            echo "::error::checkver failed with exit code $exit_code"
            exit 1
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update manifests"
            git push
          fi
